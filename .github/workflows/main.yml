# Simple workflow for deploying static content to GitHub Pages
name: Deploy
# env:
#   PUBLISH_DIR: portfolio/bin/Release/net9.0/publish/wwwroot

on:
  # Runs on pushes targeting the default branch for the app's folder path
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Wasm Tools
        run: dotnet workload install wasm-tools

      - name: Restore
        run: dotnet restore

      - name: Build app
        run: dotnet build -c Release --no-restore

      - name: Publish app
        run: dotnet publish portfolio.csproj -c Release

      # - name: Rewrite base href
      #   uses: SteveSandersonMS/ghaction-rewrite-base-href@v1.1.0
      #   with:
      #     html_path: ${{ env.PUBLISH_DIR }}/index.html
      #     base_href: /portfolio/
        
      - name: Setup Pages
        uses: actions/configure-pages@v5 # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # v4.0.0
        with:
          path: bin/Release/net9.0/publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5